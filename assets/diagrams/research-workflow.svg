<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
    * { font-family: 'JetBrains Mono', 'Noto Sans SC', 'SF Mono', 'Cascadia Code', monospace; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="compGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(8,51,68,0.5)"/>
      <stop offset="100%" stop-color="rgba(8,51,68,0.35)"/>
    </linearGradient>
    <linearGradient id="compGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(6,78,59,0.5)"/>
      <stop offset="100%" stop-color="rgba(6,78,59,0.35)"/>
    </linearGradient>
    <linearGradient id="compGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(76,29,149,0.5)"/>
      <stop offset="100%" stop-color="rgba(76,29,149,0.35)"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1100" height="800" fill="url(#bgGrad)"/>
  <rect width="1100" height="800" fill="url(#grid)"/>

  <text x="550" y="38" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle" filter="url(#glow)">🧪 Biology Research Workflow with Claude Code</text>

  <!-- Phase 1: Question -->
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="200" height="70" rx="35" fill="#0f172a"/>
    <rect x="0" y="0" width="200" height="70" rx="35" fill="url(#compGrad1)" stroke="#22d3ee" stroke-width="2"/>
    <text x="100" y="30" fill="#cffafe" font-size="11" font-weight="700" text-anchor="middle">🔬 Research Question</text>
    <text x="100" y="48" fill="#a5f3fc" font-size="8" text-anchor="middle">Define hypothesis &amp; aims</text>
    <text x="100" y="62" fill="#67e8f9" font-size="7" text-anchor="middle">Phase 1</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 550,140 L 550,175" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- Phase 2: Literature -->
  <g transform="translate(450, 180)">
    <rect x="0" y="0" width="200" height="70" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="200" height="70" rx="8" fill="url(#compGrad1)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="100" y="30" fill="#cffafe" font-size="11" font-weight="700" text-anchor="middle">📚 Literature Review</text>
    <text x="100" y="48" fill="#a5f3fc" font-size="8" text-anchor="middle">Search PubMed, summarize</text>
    <text x="100" y="62" fill="#67e8f9" font-size="7" text-anchor="middle">Phase 2</text>
  </g>

  <!-- Branch: Literature → multiple next steps -->
  <path d="M 550,250 L 550,280 L 200,280 L 200,315" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <path d="M 550,250 L 550,315" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <path d="M 550,250 L 550,280 L 900,280 L 900,315" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Phase 3a: Data Acquisition (Left) -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="240" height="80" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="240" height="80" rx="8" fill="url(#compGrad2)" stroke="#34d399" stroke-width="1.5"/>
    <text x="120" y="25" fill="#d1fae5" font-size="11" font-weight="700" text-anchor="middle">🧬 Data Acquisition</text>
    <text x="120" y="44" fill="#a7f3d0" font-size="8" text-anchor="middle">Download from NCBI / GEO / SRA</text>
    <text x="120" y="60" fill="#6ee7b7" font-size="8" text-anchor="middle">FASTQ / BAM / FASTA files</text>
    <text x="120" y="76" fill="#34d399" font-size="7" text-anchor="middle">Phase 3a</text>
  </g>

  <!-- Phase 3b: Analysis (Center) -->
  <g transform="translate(420, 320)">
    <rect x="0" y="0" width="260" height="80" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="260" height="80" rx="8" fill="url(#compGrad2)" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="25" fill="#d1fae5" font-size="11" font-weight="700" text-anchor="middle">🔬 Computational Analysis</text>
    <text x="130" y="44" fill="#a7f3d0" font-size="8" text-anchor="middle">Quality control, alignment, quantification</text>
    <text x="130" y="60" fill="#6ee7b7" font-size="8" text-anchor="middle">Differential expression, variant calling</text>
    <text x="130" y="76" fill="#34d399" font-size="7" text-anchor="middle">Phase 3b</text>
  </g>

  <!-- Phase 3c: Visualization (Right) -->
  <g transform="translate(790, 320)">
    <rect x="0" y="0" width="230" height="80" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="230" height="80" rx="8" fill="url(#compGrad2)" stroke="#34d399" stroke-width="1.5"/>
    <text x="115" y="25" fill="#d1fae5" font-size="11" font-weight="700" text-anchor="middle">📊 Visualization</text>
    <text x="115" y="44" fill="#a7f3d0" font-size="8" text-anchor="middle">Volcano / MA / heatmap plots</text>
    <text x="115" y="60" fill="#6ee7b7" font-size="8" text-anchor="middle">Publication-quality figures</text>
    <text x="115" y="76" fill="#34d399" font-size="7" text-anchor="middle">Phase 3c</text>
  </g>

  <!-- Combine arrows to Phase 4 -->
  <path d="M 200,400 L 200,440 L 550,440 L 550,475" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 550,400 L 550,475" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <path d="M 900,400 L 900,440 L 550,440" fill="none" stroke="#34d399" stroke-width="1.5"/>

  <!-- Phase 4: Interpretation -->
  <g transform="translate(400, 480)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="70" rx="8" fill="url(#compGrad3)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="150" y="28" fill="#ddd6fe" font-size="12" font-weight="700" text-anchor="middle">💡 Interpretation &amp; Writing</text>
    <text x="150" y="46" fill="#c4b5fd" font-size="8" text-anchor="middle">Analyze results, draft manuscript</text>
    <text x="150" y="62" fill="#a78bfa" font-size="7" text-anchor="middle">Phase 4</text>
  </g>

  <!-- Arrow 4→5 -->
  <path d="M 550,550 L 550,585" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5: Publication -->
  <g transform="translate(400, 590)">
    <rect x="0" y="0" width="300" height="70" rx="35" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="70" rx="35" fill="url(#compGrad3)" stroke="#a78bfa" stroke-width="2"/>
    <text x="150" y="30" fill="#ddd6fe" font-size="12" font-weight="700" text-anchor="middle">🎯 Publication &amp; Sharing</text>
    <text x="150" y="48" fill="#c4b5fd" font-size="8" text-anchor="middle">Paper, code, data repositories</text>
    <text x="150" y="62" fill="#a78bfa" font-size="7" text-anchor="middle">Phase 5</text>
  </g>

  <!-- Iteration loop back -->
  <path d="M 700,625 Q 750,625 750,300 Q 750,105 650,105" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)" stroke-opacity="0.6"/>
  <text x="760" y="380" fill="#64748b" font-size="8" transform="rotate(90,760,380)">Iterative refinement</text>

  <!-- ============================================ -->
  <!-- Claude Code Integration Points -->
  <!-- ============================================ -->
  <g transform="translate(20, 680)">
    <rect x="0" y="0" width="1060" height="105" rx="8" fill="rgba(30,41,59,0.7)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="530" y="22" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">🤖 Claude Code Integration Points</text>

    <g transform="translate(15, 35)">
      <rect x="0" y="0" width="155" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="77" y="22" fill="#fef9c3" font-size="9" font-weight="600" text-anchor="middle">📥 Data Download</text>
      <text x="77" y="38" fill="#fde68a" font-size="7" text-anchor="middle">Automate SRA/GEO</text>
      <text x="77" y="52" fill="#fde68a" font-size="7" text-anchor="middle">data retrieval</text>
    </g>

    <g transform="translate(185, 35)">
      <rect x="0" y="0" width="155" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="77" y="22" fill="#fef9c3" font-size="9" font-weight="600" text-anchor="middle">🐍 Script Generation</text>
      <text x="77" y="38" fill="#fde68a" font-size="7" text-anchor="middle">Write Python/R/</text>
      <text x="77" y="52" fill="#fde68a" font-size="7" text-anchor="middle">bash analysis scripts</text>
    </g>

    <g transform="translate(355, 35)">
      <rect x="0" y="0" width="155" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="77" y="22" fill="#fef9c3" font-size="9" font-weight="600" text-anchor="middle">🔬 Pipeline Design</text>
      <text x="77" y="38" fill="#fde68a" font-size="7" text-anchor="middle">Snakemake/Nextflow</text>
      <text x="77" y="52" fill="#fde68a" font-size="7" text-anchor="middle">workflow creation</text>
    </g>

    <g transform="translate(525, 35)">
      <rect x="0" y="0" width="155" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="77" y="22" fill="#fef9c3" font-size="9" font-weight="600" text-anchor="middle">📊 Figure Creation</text>
      <text x="77" y="38" fill="#fde68a" font-size="7" text-anchor="middle">Publication-quality</text>
      <text x="77" y="52" fill="#fde68a" font-size="7" text-anchor="middle">ggplot/matplotlib</text>
    </g>

    <g transform="translate(695, 35)">
      <rect x="0" y="0" width="155" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="77" y="22" fill="#fef9c3" font-size="9" font-weight="600" text-anchor="middle">📝 Paper Writing</text>
      <text x="77" y="38" fill="#fde68a" font-size="7" text-anchor="middle">Manuscript drafts,</text>
      <text x="77" y="52" fill="#fde68a" font-size="7" text-anchor="middle">methods, figures</text>
    </g>

    <g transform="translate(865, 35)">
      <rect x="0" y="0" width="175" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="87" y="22" fill="#fef9c3" font-size="9" font-weight="600" text-anchor="middle">✅ Reproducibility</text>
      <text x="87" y="38" fill="#fde68a" font-size="7" text-anchor="middle">Docker environments,</text>
      <text x="87" y="52" fill="#fde68a" font-size="7" text-anchor="middle">package management</text>
    </g>
  </g>
</svg>
