<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
    * { font-family: 'JetBrains Mono', 'Noto Sans SC', 'SF Mono', 'Cascadia Code', monospace; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1100" height="700" fill="url(#bgGrad)"/>
  <rect width="1100" height="700" fill="url(#grid)"/>

  <text x="550" y="38" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle" filter="url(#glow)">🔌 MCP (Model Context Protocol) Architecture for Biology</text>
  <text x="550" y="56" fill="#94a3b8" font-size="10" text-anchor="middle">How Claude Code connects to biology databases and tools via MCP servers</text>

  <!-- Claude Code box (center) -->
  <g transform="translate(400, 85)" filter="url(#glow)">
    <rect x="0" y="0" width="300" height="90" rx="12" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="90" rx="12" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
    <text x="150" y="35" fill="#d1fae5" font-size="14" font-weight="700" text-anchor="middle">🤖 Claude Code</text>
    <text x="150" y="55" fill="#a7f3d0" font-size="9" text-anchor="middle">AI Assistant for Biology Research</text>
    <text x="150" y="72" fill="#6ee7b7" font-size="8" text-anchor="middle">Natural Language → Tool Calls → Results</text>
  </g>

  <!-- MCP Protocol Layer -->
  <g transform="translate(340, 195)">
    <rect x="0" y="0" width="420" height="30" rx="6" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="210" y="19" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">⏺ MCP Protocol Layer — Tool Discovery &amp; Invocation</text>
  </g>

  <!-- Arrows from Claude Code to MCP layer -->
  <path d="M 550,175 L 550,193" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- MCP Server boxes (3 rows of 3) -->
  <!-- Row 1 -->
  <g transform="translate(55, 250)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="150" y="25" fill="#fef9c3" font-size="11" font-weight="700" text-anchor="middle">🧬 NCBI / BLAST MCP</text>
    <text x="150" y="42" fill="#fde68a" font-size="8" text-anchor="middle">Sequence search, Entrez queries, BLAST alignment</text>
    <text x="150" y="58" fill="#fde68a" font-size="7" text-anchor="middle">nucleotide, protein, genome databases</text>
  </g>

  <g transform="translate(400, 250)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="150" y="25" fill="#fef9c3" font-size="11" font-weight="700" text-anchor="middle">🔬 UniProt / PDB MCP</text>
    <text x="150" y="42" fill="#fde68a" font-size="8" text-anchor="middle">Protein data retrieval, structure analysis</text>
    <text x="150" y="58" fill="#fde68a" font-size="7" text-anchor="middle">UniProtKB, PDB structures, AlphaFold</text>
  </g>

  <g transform="translate(745, 250)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="150" y="25" fill="#fef9c3" font-size="11" font-weight="700" text-anchor="middle">📚 PubMed MCP</text>
    <text x="150" y="42" fill="#fde68a" font-size="8" text-anchor="middle">Literature search, paper retrieval</text>
    <text x="150" y="58" fill="#fde68a" font-size="7" text-anchor="middle">PubMed, PMC, MeSH terms</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(55, 355)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="150" y="25" fill="#ddd6fe" font-size="11" font-weight="700" text-anchor="middle">🐍 BioPython MCP</text>
    <text x="150" y="42" fill="#c4b5fd" font-size="8" text-anchor="middle">Sequence manipulation, format conversion</text>
    <text x="150" y="58" fill="#c4b5fd" font-size="7" text-anchor="middle">FASTA/GenBank parsing, phylogenetic trees</text>
  </g>

  <g transform="translate(400, 355)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="150" y="25" fill="#ddd6fe" font-size="11" font-weight="700" text-anchor="middle">📊 R / Bioconductor MCP</text>
    <text x="150" y="42" fill="#c4b5fd" font-size="8" text-anchor="middle">Statistical omics analysis</text>
    <text x="150" y="58" fill="#c4b5fd" font-size="7" text-anchor="middle">DESeq2, limma, clusterProfiler</text>
  </g>

  <g transform="translate(745, 355)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="150" y="25" fill="#ddd6fe" font-size="11" font-weight="700" text-anchor="middle">🧪 Lab Data MCP</text>
    <text x="150" y="42" fill="#c4b5fd" font-size="8" text-anchor="middle">ELN and LIMS integration</text>
    <text x="150" y="58" fill="#c4b5fd" font-size="7" text-anchor="middle">Benchling, LabArchives, custom</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(55, 460)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="150" y="25" fill="#cffafe" font-size="11" font-weight="700" text-anchor="middle">🔗 GEO / SRA MCP</text>
    <text x="150" y="42" fill="#a5f3fc" font-size="8" text-anchor="middle">Gene expression and sequencing data</text>
    <text x="150" y="58" fill="#a5f3fc" font-size="7" text-anchor="middle">GEO metadata, SRA run accessions</text>
  </g>

  <g transform="translate(400, 460)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="150" y="25" fill="#cffafe" font-size="11" font-weight="700" text-anchor="middle">🧪 Cheminformatics MCP</text>
    <text x="150" y="42" fill="#a5f3fc" font-size="8" text-anchor="middle">Molecular properties, docking</text>
    <text x="150" y="58" fill="#a5f3fc" font-size="7" text-anchor="middle">RDKit, PubChem, ChEMBL</text>
  </g>

  <g transform="translate(745, 460)">
    <rect x="0" y="0" width="300" height="75" rx="8" fill="#0f172a"/>
    <rect x="0" y="0" width="300" height="75" rx="8" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="150" y="25" fill="#cffafe" font-size="11" font-weight="700" text-anchor="middle">✅ Reproducibility MCP</text>
    <text x="150" y="42" fill="#a5f3fc" font-size="8" text-anchor="middle">Docker, Conda, Git integration</text>
    <text x="150" y="58" fill="#a5f3fc" font-size="7" text-anchor="middle">Environment snapshots, version control</text>
  </g>

  <!-- Arrows from MCP layer to servers -->
  <path d="M 205,225 L 205,248" fill="none" stroke="#fb923c" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <path d="M 550,225 L 550,248" fill="none" stroke="#fb923c" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <path d="M 895,225 L 895,248" fill="none" stroke="#fb923c" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- Bottom info bar -->
  <g transform="translate(55, 570)">
    <rect x="0" y="0" width="990" height="55" rx="8" fill="rgba(30,41,59,0.6)"/>
    <text x="495" y="20" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle">💡 MCP servers are configured in ~/.claude/settings.json or project .claude/settings.json</text>
    <text x="495" y="38" fill="#64748b" font-size="9" text-anchor="middle">Claude Code auto-discovers MCP tools — just describe your biology task in natural language</text>
  </g>

  <!-- Legend -->
  <g transform="translate(55, 640)">
    <circle cx="10" cy="6" r="5" fill="#fbbf24"/>
    <text x="22" y="10" fill="#94a3b8" font-size="8">Public Database APIs</text>
    <circle cx="200" cy="6" r="5" fill="#a78bfa"/>
    <text x="212" y="10" fill="#94a3b8" font-size="8">Bioinformatics Tools</text>
    <circle cx="380" cy="6" r="5" fill="#22d3ee"/>
    <text x="392" y="10" fill="#94a3b8" font-size="8">Specialized Data Sources</text>
  </g>
</svg>
